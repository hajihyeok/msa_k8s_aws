      # working-directory version

      # 1) apigateway
      - name: apigateway build and push docker image to ecr
        working-directory: ./apigateway
        env:
          REGISTRY: 065656773560.dkr.ecr.us-east-1.amazonaws.com
          REPOSITORY: apigateway
          IMAGE_TAG: latest
        run: |
          docker build -t ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG} -f Dockerfile .
          docker push ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}

      - name: apigateway kubectl apply
        working-directory: ./apigateway/k8s
        run: |
          kubectl apply -f apigateway-depl.yml
          kubectl rollout restart deployment apigateway-deployment -n lgcns

      # 2) user
      - name: user build and push docker image to ecr
        working-directory: ./user
        env:
          REGISTRY: 065656773560.dkr.ecr.us-east-1.amazonaws.com
          REPOSITORY: user-service
          IMAGE_TAG: latest
        run: |
          docker build -t ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG} -f Dockerfile .
