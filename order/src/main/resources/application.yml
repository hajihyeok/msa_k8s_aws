# msa - k8s - aws version

# eks 배포 시 apigateway는 eureka server에 등록하지 않겠다, 라는 의미
eureka:
  client:
    enabled: false

spring:
  application:
    name: order-service # 이름
  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&verifyServerCertificate=false
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate: 
      ddl-auto: create
    show-sql: true

  kafka:
    # pod 실행 중인 service 이름으로 변경 (localhost X)
    kafka-server: kafka-service:9092

# # Feign + CircuitBreaker 트랜젝션 처리
feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 40
        wait-duration-in-open-state: 10s